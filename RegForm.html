<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Form.css">
</head>
<body>
    <div class="contain">
        <form id="RegForm">
            <label for="name">NAME:</label> 
            <input type="text" id="name">
             <br>
            <label for="email">Email:</label> 
            <input type="email" id="email"> 
            <br>
            <label for="phone">Phone:</label> 
            <input type="text" id="phone"> 
            <br>
            <label for="what">Course:</label>     
            <!-- <input type="text" id="what"> -->
             <select name="" id="what">
                <option value="">Select an option</option>
                <option value="CSE">CSE</option>
                <option value="CE">CE</option>
                <option value="ME">ME</option>
             </select>
            <br>
            <label for="pass">Password:</label> 
            <input type="password" id="pass">
            <br>
            <button id="submit" onclick="validate()">SUBMIT</button>
        </form>
    </div>
    <script>
        function validate(){
            var form1=document.getElementById("RegForm");
            var name=form1.name.value;
            var email=form1.email.value;
            var phone=form1.phone.value;
            var what=form1.what.value;  
            var pass=form1.pass.value;
var regEmail=/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
var regPhone=/^\d{10}$/;
if(name==""){
    alert("Please enter your name");
    return false;
}else if(email==""||!regEmail.test(email)){
    alert("Please enter a valid email address");
    return false;
}else if(phone==""||!regPhone.test(phone)){
    alert("Please enter a valid phone number");
    return false;
}else if(what.selectedIndex==-1){
    alert("Please enter what you are interested in");
    return false;
}else if(pass==""){
    alert("Please enter a password");
    return false;
}else if (pass.length<6){
    alert("Password must be at least 6 characters long");
    return false;
}
   
        }
    </script>
</body>
</html>
