    <style>
        nav{
            position: sticky;
            top: 0;
            background: #333;
            padding: 15px;
            z-index: 1000;

        }
        nav a {
            color: white;

        section {

        }

        .section-title h2 {
            font-size: 40px;
            color: #333;
        }

        .section-title p {
            color: #666;
    }

        .gallery{
            display :grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap: 100px;
        }

        .gallery img{
            width: 119%;
            height: 350px;
            object-fit: cover;
            border-radius: 12px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .gallery img:hover{
            transform:scale(1.03);
        }
    </style>
</head>
